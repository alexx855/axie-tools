name: Bug report
description: Report a reproducible problem with axie-tools.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include private keys, marketplace access tokens, API keys, or wallet seed phrases.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command or code path and any relevant non-secret environment details.
      placeholder: |
        1. Run ...
        2. Call ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized errors or transaction hashes if relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: axie-tools version
      placeholder: "1.7.7"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"
    validations:
      required: true
  - type: dropdown
    id: operation-risk
    attributes:
      label: Operation type
      options:
        - Read-only query
        - Approval
        - Buy order
        - Create listing
        - Cancel listing
        - Transfer
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized logs, links, or screenshots.

name: Publish axie-tools release

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag to publish under"
        type: choice
        required: true
        default: latest
        options:
          - latest
          - next
          - beta
          - alpha

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    name: Tag and publish current main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org/"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          NEW_VERSION=$(node -p "require('./package.json').version")
          TAG="v${NEW_VERSION}"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists locally. Aborting publish." >&2
            exit 1
          fi

          if git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin. Aborting publish." >&2
            exit 1
          fi

          if npm view "axie-tools@${NEW_VERSION}" version >/dev/null 2>&1; then
            echo "axie-tools@${NEW_VERSION} is already published. Aborting publish." >&2
            exit 1
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm build

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is not set. Please add it in repository settings > Secrets and variables > Actions." >&2
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          pnpm publish --no-git-checks --access public --tag "${{ github.event.inputs.npm_tag }}" --provenance

      - name: Create and push Git tag
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          name: "Release ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Prepare axie-tools release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Select the release type"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - prerelease
          - custom
      preid:
        description: "Pre-release identifier (used when release_type = prerelease)"
        type: string
        required: false
        default: rc
      custom_version:
        description: "Custom version (used when release_type = custom), e.g. 1.8.0"
        type: string
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: Create version bump PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate inputs
        run: |
          set -euo pipefail
          TYPE="${{ github.event.inputs.release_type }}"
          if [ "$TYPE" = "custom" ] && [ -z "${{ github.event.inputs.custom_version }}" ]; then
            echo "custom_version is required when release_type=custom" >&2
            exit 1
          fi

      - name: Bump version
        id: bump
        run: |
          set -euo pipefail
          TYPE="${{ github.event.inputs.release_type }}"
          PREID="${{ github.event.inputs.preid }}"
          CUSTOM="${{ github.event.inputs.custom_version }}"

          if [ "$TYPE" = "prerelease" ]; then
            pnpm version prerelease --preid "$PREID" --no-git-tag-version
          elif [ "$TYPE" = "custom" ]; then
            pnpm version "$CUSTOM" --no-git-tag-version
          else
            pnpm version "$TYPE" --no-git-tag-version
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release pull request
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -euo pipefail
          BRANCH="release/v${NEW_VERSION}"

          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add package.json
          git commit -m "chore(release): v${NEW_VERSION}"
          git push --set-upstream origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(release): v${NEW_VERSION}" \
            --body "Version bump for axie-tools v${NEW_VERSION}.\n\nAfter this PR is merged and CI is green, run the \"Publish axie-tools release\" workflow for v${NEW_VERSION}."
